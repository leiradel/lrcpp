# Path to the libretro core to load. Required.
# sdl2lrcpp_core_path = "cores/example_libretro.dll"

# Path to the content to load with the core. Not required if the core supports
# being started without content (RETRO_ENVIRONMENT_SET_SUPPORT_NO_GAME).
# sdl2lrcpp_content_path = "content/game.rom"

# Directory reported to the core for its system files (BIOS, etc). Defaults to
# the directory of sdl2lrcpp_core_path.
# sdl2lrcpp_system_path = "system"

# Directory reported to the core for its bundled assets. Defaults to the
# directory of sdl2lrcpp_core_path.
# sdl2lrcpp_assets_path = "assets"

# Directory reported to the core for save files. Defaults to the directory of
# sdl2lrcpp_content_path (or the current directory when no content is set).
# sdl2lrcpp_save_path = "saves"

# Log level for the frontend and libretro cores. Messages below this level are
# ignored. One of: debug, info, warn, error. Defaults to warn.
# sdl2lrcpp_log_level = "warn"

# Path to a file that log messages are written to (created, overwriting any
# existing file). If not set, there is no log output.
# sdl2lrcpp_log_path = "sdl2lrcpp.log"

# The audio device to use, as reported in the log as "Audio device X:"
# sdl2lrcpp_audio_device = "Built-in Audio Analog Stereo"

# The video renderer to use, as reported in the log as "Render driver X:"
# sdl2lrcpp_video_renderer = "opengl"

# Smoothens picture with bilinear filtering. Should be disabled if using pixel shaders.
# sdl2lrcpp_video_smooth = false

# Any option that does not start with "sdl2lrcpp_" is passed to the libretro core
# as a core option (RETRO_ENVIRONMENT_GET_VARIABLE), for example:
# some_core_option = "value"
